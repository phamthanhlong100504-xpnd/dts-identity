version: '3.9'

services:
  # ==================== Identity Service ====================
  identity-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dts-identity-service
    ports:
      - "${SERVER_PORT:-8081}:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=dts_identity
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_URI=http://eureka-server:8761/eureka
      - EUREKA_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - dts-network

  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: dts-identity-postgres
    ports:
      - "${DB_EXTERNAL_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: dts_identity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d dts_identity" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dts-network

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: dts-identity-redis
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - dts-network

  # ==================== ZooKeeper (for Kafka) ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: dts-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped
    networks:
      - dts-network

  # ==================== Kafka ====================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: dts-kafka
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    restart: unless-stopped
    networks:
      - dts-network

  # ==================== pgAdmin (optional) ====================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dts-pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dts.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - dts-network
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  pgadmin_data:

networks:
  dts-network:
    driver: bridge
