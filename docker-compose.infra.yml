# ================================================================
# docker-compose.infra.yml
# CHỈ chạy hạ tầng: Postgres, Redis, Kafka.
# Ứng dụng Identity Service chạy trực tiếp trên máy (IDE / CLI).
#
#   docker compose -f docker-compose.infra.yml up -d
#   mvn spring-boot:run
# ================================================================
services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: dts-identity-postgres
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-dts_identity}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-dts_identity}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dts-network

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: dts-identity-redis
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - dts-network

  # ==================== ZooKeeper (cho Kafka) ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: dts-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped
    networks:
      - dts-network

  # ==================== Kafka ====================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: dts-kafka
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${KAFKA_EXTERNAL_PORT:-9092}
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    restart: unless-stopped
    networks:
      - dts-network

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:

networks:
  dts-network:
    driver: bridge
