# Profile for docker-compose environment
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/dts_identity
    username: postgres
    password: postgres
  data:
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:9092

logging:
  level:
    root: INFO
    com.dts.identity: INFO
