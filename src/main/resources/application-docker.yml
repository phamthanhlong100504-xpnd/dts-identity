# Profile "docker" — kích hoạt khi SPRING_PROFILES_ACTIVE=docker
# Override các giá trị mặc định từ application.yml bằng service name trong docker-compose network
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:dts_identity}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

logging:
  level:
    root: INFO
    com.dts.identity: INFO
